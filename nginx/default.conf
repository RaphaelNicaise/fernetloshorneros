# default.conf for fernetloshorneros.com

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

server {
    # HTTP www → HTTPS sin www
    listen 80;
    listen [::]:80;
    server_name www.fernetloshorneros.com;
    return 301 https://fernetloshorneros.com$request_uri;
}

server {
    # HTTP sin www → HTTPS sin www
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name fernetloshorneros.com;
    return 301 https://fernetloshorneros.com$request_uri;
}

server {
    # HTTPS www → HTTPS sin www
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.fernetloshorneros.com;

    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;

    return 301 https://fernetloshorneros.com$request_uri;
}

server {
    # HTTPS sin www — servidor principal
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;
    server_name fernetloshorneros.com;

    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    client_max_body_size 10M;

    # --- OPTIMIZACIÓN DE BUFFERS ---
    # Evita el warning "upstream response is buffered to a temporary file"
    # y sirve archivos pesados (ej. imágenes) directo desde la RAM.
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;
    proxy_temp_file_write_size 256k;

    # --- EXCEPCIONES PÚBLICAS PARA UMAMI ---
    # Esto permite que el script de rastreo funcione para todos los visitantes
    location = /stats/script.js {
        proxy_pass http://umami:3002/umami/script.js;
        proxy_set_header Host $host;
    }

    location = /stats/api/send {
        proxy_pass http://umami:3002/umami/api/send;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # --- DASHBOARD DE UMAMI ---
    # Maneja tanto /umami como /umami/ sin bucles
    location ^~ /umami {
        # DESACTIVAMOS auth_request para que Umami maneje su propio login
        # auth_request /_auth_admin;
        # error_page 401 = @umami_login_redirect;
        # error_page 403 = @forbidden;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Esta cabecera es la que le dice a Next.js que no se vuelva loco
        proxy_set_header X-Forwarded-Prefix /umami;

        # IMPORTANTE: No pongas barra "/" después del 3002. 
        # Esto le pasa la ruta original completa al contenedor.
        proxy_pass http://umami:3002;
    }

    # location @umami_login_redirect { return 302 /admin/login?next=/umami; }

    # --- FRONTEND (Next.js) ---
    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_read_timeout 90;
    }

    location /_next/ {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
        access_log off;
        expires 365d;
    }

    # --- AUTH SUBREQUEST ---
    location = /_auth_admin {
        internal;
        proxy_pass http://backend:3001/admin/verify;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Cookie $http_cookie;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Original-URI $request_uri;
    }

    # --- API ---
    location /api/ {
        proxy_pass http://backend:3001/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_cache_bypass $http_upgrade;

        limit_req zone=api burst=20 nodelay;
    }

    # --- UPLOADS ---
    location /uploads/ {
        alias /var/www/uploads/;
        expires 1y;
        access_log off;
        add_header Cache-Control "public";
    }

    # --- PHPMYADMIN ---
    location = /phpmyadmin { return 301 /phpmyadmin/; }
    location ^~ /phpmyadmin/ {
        auth_request /_auth_admin;
        error_page 401 = @admin_login_redirect;
        error_page 403 = @forbidden;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Prefix /phpmyadmin/;
        proxy_pass http://phpmyadmin/;
    }
    location @admin_login_redirect { return 302 /admin/login?next=/phpmyadmin/; }
    location @forbidden { return 403; }

    # --- PORTAINER ---
    location = /portainer { return 301 /portainer/; }
    location ^~ /portainer/ {
        auth_request /_auth_admin;
        error_page 401 = @portainer_login_redirect;
        error_page 403 = @forbidden;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://portainer:9000/;
    }
    location @portainer_login_redirect { return 302 /admin/login?next=/portainer/; }

    # --- SEGURIDAD EXTRA ---
    location ~* ^/uploads/.*\.(php|jsp|asp|sh)$ { return 403; }
    location ~ /\.(env|git) { deny all; }
}