  services:

      backend:
        build:
          context: ./backend
          dockerfile: Dockerfile.dev
        container_name: backend_fernet
        ports:
          - "3001:3001"
        volumes:
          - ./backend:/app:cached
          - /app/node_modules
        environment:
          MP_ACCESS_TOKEN: ${MP_ACCESS_TOKEN}
          MP_PUBLIC_KEY: ${MP_PUBLIC_KEY}
          NODE_ENV: development
          PORT: 3001
          MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
          MYSQL_DATABASE: ${MYSQL_DATABASE}
          MYSQL_PASSWORD: ${MYSQL_PASSWORD}
          MYSQL_HOST: ${MYSQL_HOST}
          MYSQL_PORT: ${MYSQL_PORT}
          MYSQL_USER: ${MYSQL_USER}
          SMTP_HOST: ${SMTP_HOST}|
          SMTP_PORT: ${SMTP_PORT}
          MAIL_USER: ${MAIL_USER}
          MAIL_FROM: ${MAIL_FROM}
          ADMIN_USER: ${ADMIN_USER}
          ADMIN_PASSWORD: ${ADMIN_PASSWORD}
          MAIL_PASSWORD: ${MAIL_PASSWORD}
          ZIPNOVA_BASE_URL: ${ZIPNOVA_BASE_URL}
          ZIPNOVA_API_KEY: ${ZIPNOVA_API_KEY}
          ZIPNOVA_API_SECRET: ${ZIPNOVA_API_SECRET}
        depends_on:
          mysql:
            condition: service_healthy
        networks:
          - app_network

      frontend:
        build:
          context: ./frontend
          dockerfile: Dockerfile.dev
        container_name: frontend
        ports:
          - "3000:3000"
        environment:
          NODE_ENV: development
          HOST: 0.0.0.0
          WATCHPACK_POLLING: "true"
          WATCHPACK_POLLING_INTERVAL: "1000"
          CI: "true"
          NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
          MAINTENANCE_ALLOWED_IPS: ${MAINTENANCE_ALLOWED_IPS:-}
        volumes:
          - ./frontend:/app
          - /app/node_modules
        command: pnpm dev
        depends_on:
          - backend
        networks:
          - app_network


      mysql:
        image: mysql:8.0
        container_name: db_fernetloshorneros_dev
        ports:
          - "3306:3306"
        environment:
          MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
          MYSQL_DATABASE: ${MYSQL_DATABASE}
          MYSQL_PASSWORD: ${MYSQL_PASSWORD}
          MYSQL_HOST: ${MYSQL_HOST}
        volumes:
          - mysql_data:/var/lib/mysql
          - ./db/sql/01-init.sql:/docker-entrypoint-initdb.d/01-init.sql    
        networks:
          - app_network
        healthcheck:
          test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
          interval: 10s
          timeout: 5s
          retries: 5
          start_period: 10s

      phpmyadmin:
        image: phpmyadmin/phpmyadmin
        container_name: phpmyadmin_fernet
        depends_on:
          - mysql
        ports:
          - "8080:80"
        environment:
          PMA_HOST: mysql
          PMA_PORT: 3306
        networks:
          - app_network
      # temporal porque el vps usa dev

      portainer:
        image: portainer/portainer-ce:latest
        container_name: portainer_dev
        restart: unless-stopped
        ports:
          - "9000:9000" # Accedés por el puerto 9000 de tu VPS
        volumes:
          - /var/run/docker.sock:/var/run/docker.sock # Necesario para leer la info de Docker
          - portainer_data:/data
        networks:
          - app_network

      umami_db:
        image: postgres:15-alpine
        container_name: umami_db_dev
        restart: unless-stopped
        environment:
          POSTGRES_DB: umami
          POSTGRES_USER: umami_user
          POSTGRES_PASSWORD: ${UMAMI_DB_PASSWORD}
        volumes:
          - umami_data:/var/lib/postgresql/data
        networks:
          - app_network
        healthcheck:
          test: ["CMD-SHELL", "pg_isready -U umami_user -d umami"]
          interval: 5s
          timeout: 5s
          retries: 5

      umami:
        image: ghcr.io/umami-software/umami:postgresql-latest
        container_name: umami_dev
        restart: unless-stopped
        ports:
          - "3002:3002"
        environment:
          DATABASE_URL: postgresql://umami_user:${UMAMI_DB_PASSWORD}@umami_db:5432/umami
          DATABASE_TYPE: postgresql
          APP_SECRET: ${UMAMI_APP_SECRET}
          PORT: 3002
        depends_on:
          umami_db:
            condition: service_healthy
        networks:
          - app_network   


  networks:
    app_network:
      driver: bridge

  volumes:
    mysql_data:
      driver: local
    frontend_node_modules:
      driver: local
    uploads_data:
      driver: local
    portainer_data:
      driver: local
    umami_data:
      driver: local